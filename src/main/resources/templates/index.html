<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart Workshop Manager</title>
    <link rel="stylesheet" th:href="@{css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="hero">
    <section class="hero-content">
        <p class="eyebrow">Твоят онлайн помощник</p>
        <h1>Управлявай работилница, оборудване и сервизни заявки от едно място.</h1>
        <p class="lead">
            Smart Workshop Manager помага на малки сервизи, училищни лаборатории и работилници
            да следят наличното оборудване, резервациите, задачите и поддръжката.
        </p>

        <div class="hero-actions" th:if="${session.userId == null}">
            <a class="btn btn-primary btn-lg" th:href="@{/register}">Започни с регистрация</a>
            <a class="btn btn-outline btn-lg" th:href="@{/login}">Имам профил</a>
        </div>

        <div class="hero-actions" th:if="${session.userId != null}">
            <a class="btn btn-primary btn-lg" th:href="@{/dashboard}">Към таблото</a>
        </div>
    </section>
</main>
</body>
</html>
