<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="auth-layout">
    <section class="auth-card wide">
        <h1>Регистрация</h1>

        <form th:action="@{/register}" th:object="${userRegisterRequest}" th:method="post" class="form grid-form">
            <label>
                Име
                <input type="text" th:field="*{fullName}" placeholder="Иван Иванов">
                <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </label>

            <label>
                Имейл
                <input type="email" th:field="*{email}" placeholder="ivan@mail.com">
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </label>

            <label>
                Роля
                <select th:field="*{role}">
                    <option value="">Избери роля</option>
                    <option value="MANAGER">Мениджър</option>
                    <option value="TECHNICIAN">Техник</option>
                </select>
                <p class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></p>
            </label>

            <label>
                Парола
                <input type="password" th:field="*{password}" placeholder="Минимум 8 символа">
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </label>

            <button class="btn btn-primary full grid-span" type="submit">Създай профил</button>
        </form>
    </section>
</main>
</body>
</html>
