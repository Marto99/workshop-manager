<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${equipmentForm.id == null ? 'Ново оборудване' : 'Редакция'}">Оборудване</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="container narrow">
    <section class="form-card">
        <h1 th:text="${equipmentForm.id == null ? 'Ново оборудване' : 'Редакция на оборудване'}">Ново оборудване</h1>

        <form th:action="${equipmentForm.id == null} ? @{/equipment} : @{/equipment/{id}/edit(id=${equipmentForm.id})}"
              th:object="${equipmentForm}" method="post" class="form">
            <label>
                Име
                <input type="text" th:field="*{name}">
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </label>

            <label>
                Категория
                <input type="text" th:field="*{category}">
                <span class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
            </label>

            <label>
                Локация
                <input type="text" th:field="*{location}">
                <span class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span>
            </label>

            <label>
                Статус
                <select th:field="*{status}">
                    <option value="">Избери статус</option>
                    <option value="AVAILABLE">Налично</option>
                    <option value="RESERVED">Резервирано</option>
                    <option value="MAINTENANCE">В поддръжка</option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
            </label>

            <label>
                Цена на час
                <input type="number" step="0.01" min="0" th:field="*{hourlyRate}">
                <span class="field-error" th:if="${#fields.hasErrors('hourlyRate')}" th:errors="*{hourlyRate}"></span>
            </label>

            <div class="form-actions">
                <a class="btn btn-outline" th:href="@{/equipment}">Назад</a>
                <button class="btn btn-primary" type="submit">Запази</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
